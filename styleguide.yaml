name: "Документация — строгий русский + типографика"

replacements:
  - {from: "ё", to: "е", note: "всё равно убираем ё"}
  - {from: "--",  to: "—", note: "типографское тире"}
  - {from: " - ", to: " — ", note: "пробелы вокруг тире"}
  - {from: '"',   to: '«', note: "открывающая кавычка"}
  - {from: '"',   to: '»', note: "закрывающая кавычка (по контексту)"}

no_auto_fix:
  - template:
      - "{{[^}]+}}"
      - "{%[^%]+%}"
      - "`[^`]+`"
      - "```[^`]*```"
  - instructions:
      - "Не перефразировать, не улучшать стиль"
      - "Не менять авторские формулировки"
      - "Не предлагать синонимы"
      - "Сохранять тон и лексику оригинала"

corrections:
  allowed:
    - орфографические ошибки (кроме запрещённых зон)
    - пунктуационные ошибки
    - типографские огрехи (кавычки, тире, пробелы)
    - грубые грамматические ошибки (согласование, управление)

  forbidden:
    - любые стилистические правки
    - изменение смысла
    - перестановка частей предложения