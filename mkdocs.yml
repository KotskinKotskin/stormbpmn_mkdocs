site_name: Stormbpmn документация
site_url: https://docs.stormbpmn.com
site_description: Документация Stormbpmn
site_author: Команда Stormbpmn
docs_dir: /root/out_test_doc
repo_name: KotskinKotskin/stormbpmn_new_doc
repo_url: https://github.com/KotskinKotskin/stormbpmn_new_doc
copyright: Copyright &copy; 2019-2026 Команда Stormbpmn

hooks:
  - hooks/auto_constraints.py

# Configuration
theme:
  name: material
  language: ru
  custom_dir: ../stormbpmn-docs-styles
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  
  # Цветовая схема
  palette:
    # Светлая тема
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Переключить на тёмную тему
    
    # Тёмная тема
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Переключить на светлую тему
  
  # Функции
  features:
    # Навигация
    - navigation.tracking     # Отслеживание якорей в URL
    - navigation.tabs         # Вкладки навигации (верхний бар)
    - navigation.tabs.sticky  # Закреплённые вкладки
    - navigation.sections     # Разделы в боковой панели
    - navigation.expand       # Автоматическое расширение разделов
    - navigation.path         # Хлебные крошки
    - navigation.indexes      # Индексные страницы разделов
    - navigation.top          # Кнопка "Вверх"
    - navigation.footer       # Навигация в подвале
    
    # Поиск
    - search.suggest          # Подсказки при поиске
    - search.highlight        # Подсветка результатов
    - search.share            # Ссылка для шаринга
    
    # Заголовки
    - toc.follow              # Автоматическое следование по TOC
    
    # Контент
    - content.code.copy       # Кнопка копирования кода
    - content.code.annotate   # Аннотации в коде
    - content.tabs.link       # Связанные вкладки контента
    - content.tooltips        # Подсказки

# Plugins
plugins:
  - meta
  - macros
  - glightbox
  - autorefs
  # - social:  # Отключен - требует: pip install "mkdocs-material[imaging]"
  #     concurrency: 4
  #     cards: true
  - tags:
      tags_allowed:
        - Роли и элементы архитектуры
        - Реестр процессов
        - Редактор BPMN
        - Спецфичи редактора BPMN
        - Оргструктура
        - FAQ - ответы на частые вопросы
        - Гайды создания элементов диаграммы BPMN
        - С чего начать
        - Главная страница
        - Процессная архитектура, реестр бизнес-процессов
        - Cовместная работа над процессами - работа в команде
        - Согласование и обсуждение
        - Группы процессов, BCM модели
        - Редактор UML
        - Как исправить ошибки
        - Регламенты
        - Реестр бизнес-процессов
  - search:
      lang: [ru, en]
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

# Extensions
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  
  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Дополнительные CSS и JS
extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/primeicons/primeicons.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Социальные ссылки и дополнительная информация
extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:help@stormbpmn.com
      name: Email поддержка
    - icon: fontawesome/brands/telegram
      link: https://t.me/stormbpmn_bot
      name: Telegram Bot
    - icon: fontawesome/solid/globe
      link: https://stormbpmn.com
      name: Официальный сайт
  
  version:
    provider: mike
    default: latest